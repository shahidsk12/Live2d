<!DOCTYPE html>
<html>
<head>
    <title>VTuber Mobile Debugger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://cubism.live2d.com/sdk-web/bin/live2d.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.12/pixi.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0-beta.2/dist/index.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit/dist/kalidokit.bundle.js"></script>

    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: sans-serif; }
        #canvas { width: 100vw; height: 100vh; }
        #ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        button { padding: 20px 40px; font-size: 1.2rem; background: #00ff00; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,0,0.3); }
        #debug { position: fixed; bottom: 0; left: 0; width: 100%; height: 30%; background: rgba(0,0,0,0.85); color: #00ff00; font-family: monospace; font-size: 11px; padding: 10px; overflow-y: auto; pointer-events: none; border-top: 1px solid #333; }
        .err { color: #ff4444; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui">
        <button id="start-btn">ALLOW CAMERA & START</button>
    </div>

    <div id="debug">
        <div>[SYSTEM] Ready. Waiting for user interaction...</div>
    </div>

    <video id="video" style="display:none" playsinline></video>

    <script>
        const debug = document.getElementById('debug');
        const startBtn = document.getElementById('start-btn');
        const videoElement = document.getElementById("video");

        function log(msg, isError = false) {
            const div = document.createElement('div');
            if (isError) div.className = 'err';
            div.innerText = `> ${msg}`;
            debug.appendChild(div);
            debug.scrollTop = debug.scrollHeight;
        }

        // Initialize PIXI
        const app = new PIXI.Application({
            view: document.getElementById("canvas"),
            autoStart: true,
            resizeTo: window,
            transparent: true,
            antialias: true
        });

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            log("Phase 1: Validating Libraries...");

            // Critical Check for the "Undefined" error
            if (typeof PIXI === 'undefined' || !PIXI.live2d) {
                log("FATAL: PIXI.live2d is undefined. Check internet/scripts.", true);
                return;
            }

            try {
                log("Phase 2: Accessing Camera...");
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                videoElement.srcObject = stream;
                log("Camera: Granted", false);

                log("Phase 3: Loading Live2D Model...");
                // Note: Ensure model.json is in the same folder as this HTML
                const model = await PIXI.live2d.Live2DModel.from("model.json");
                
                app.stage.addChild(model);
                
                // Adjust for Mobile Screen
                const scale = (window.innerWidth / model.width) * 0.8;
                model.scale.set(scale);
                model.anchor.set(0.5, 0.5);
                model.x = window.innerWidth / 2;
                model.y = window.innerHeight / 2;

                log("Model: Loaded Successfully", false);
                initTracking(model);

            } catch (e) {
                log("ERROR: " + e.message, true);
                console.error(e);
            }
        });

        function initTracking(model) {
            log("Phase 4: Starting Mediapipe...");
            
            const faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults((results) => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
                    const rig = Kalidokit.Face.solve(results.multiFaceLandmarks[0], {
                        runtime: 'mediapipe',
                        video: videoElement
                    });
                    
                    applyParams(model, rig);
                }
            });

            const camera = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({image: videoElement}); },
                width: 640, height: 480
            });
            camera.start();
            log("SUCCESS: Tracking Active!", false);
        }

        function applyParams(model, rig) {
            const core = model.internalModel.coreModel;
            
            // Mapping Kalidokit to Cubism 2.1 Parameters
            core.setParamFloat('PARAM_ANGLE_X', rig.degrees.pitch);
            core.setParamFloat('PARAM_ANGLE_Y', rig.degrees.yaw);
            core.setParamFloat('PARAM_ANGLE_Z', rig.degrees.roll);
            
            core.setParamFloat('PARAM_EYE_L_OPEN', rig.eye.l);
            core.setParamFloat('PARAM_EYE_R_OPEN', rig.eye.r);
            
            core.setParamFloat('PARAM_MOUTH_OPEN_Y', rig.mouth.y);
            core.setParamFloat('PARAM_MOUTH_FORM', rig.mouth.x);
            
            // Eye ball movement
            core.setParamFloat('PARAM_EYE_BALL_X', rig.pupil.x);
            core.setParamFloat('PARAM_EYE_BALL_Y', rig.pupil.y);
        }
    </script>
</body>
</html>
