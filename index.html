<!DOCTYPE html>
<html>
<head>
    <title>VTuber Debugger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cubism.live2d.com/sdk-web/bin/live2d.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.12/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.3.1/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit/dist/kalidokit.bundle.js"></script>

    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: monospace; overflow: hidden; }
        #canvas { width: 100vw; height: 100vh; display: block; }
        #debug-log { position: fixed; bottom: 0; left: 0; width: 100%; height: 150px; background: rgba(0,0,0,0.8); padding: 10px; font-size: 12px; overflow-y: auto; border-top: 2px solid #00ff00; pointer-events: none; }
        #ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        button { padding: 15px 30px; font-size: 18px; background: #00ff00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui">
        <button id="start-btn">START TRACKING</button>
    </div>

    <div id="debug-log">
        <div>[SYSTEM] Waiting for user...</div>
    </div>

    <video id="video" style="display:none" playsinline></video>

    <script>
        const logPanel = document.getElementById('debug-log');
        const startBtn = document.getElementById('start-btn');
        const videoElement = document.getElementById("video");

        function log(msg, color = "white") {
            const div = document.createElement('div');
            div.style.color = color;
            div.innerText = `> ${msg}`;
            logPanel.appendChild(div);
            logPanel.scrollTop = logPanel.scrollHeight;
        }

        const app = new PIXI.Application({
            view: document.getElementById("canvas"),
            autoStart: true, resizeTo: window, transparent: true
        });

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            log("Init: Requesting Camera Permissions...");
            
            try {
                // Step 1: Camera Check
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                videoElement.srcObject = stream;
                log("Camera: SUCCESS", "#00ff00");

                // Step 2: Model Loading Check
                log("Model: Fetching model.json...");
                const model = await PIXI.live2d.Live2DModel.from("model.json");
                
                model.on('load', () => {
                    log("Model: ALL FILES LOADED SUCCESSFULLY", "#00ff00");
                    app.stage.addChild(model);
                    model.scale.set(0.2); // Adjust for mobile
                    model.x = window.innerWidth / 2;
                    startTracking(model);
                });

                model.on('error', (e) => {
                    log("Model Error: Failed to load texture or moc file!", "red");
                    log("Check if 'seifuku.1024' folder exists.", "yellow");
                });

            } catch (err) {
                log("FATAL ERROR: " + err.message, "red");
                if(err.name === "NotAllowedError") log("FIX: Allow camera in browser settings.", "yellow");
            }
        });

        function startTracking(model) {
            log("Tracker: Initializing Mediapipe...");
            const faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });

            faceMesh.onResults((results) => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
                    const rig = Kalidokit.Face.solve(results.multiFaceLandmarks[0], {
                        runtime: 'mediapipe', video: videoElement
                    });
                    
                    // Direct Parameter Mapping for your .moc model
                    const core = model.internalModel.coreModel;
                    core.setParamFloat('PARAM_ANGLE_X', rig.degrees.pitch);
                    core.setParamFloat('PARAM_ANGLE_Y', rig.degrees.yaw);
                    core.setParamFloat('PARAM_MOUTH_OPEN_Y', rig.mouth.y);
                    core.setParamFloat('PARAM_EYE_L_OPEN', rig.eye.l);
                    core.setParamFloat('PARAM_EYE_R_OPEN', rig.eye.r);
                }
            });

            const camera = new Camera(videoElement, {
                onFrame: async () => { await faceMesh.send({image: videoElement}); },
                width: 640, height: 480
            });
            camera.start();
            log("System: TRACKING ACTIVE", "#00ff00");
        }
    </script>
</body>
</html>
