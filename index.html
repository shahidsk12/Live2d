<!DOCTYPE html>
<html>
<head>
    <title>Nanami Fix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://cubism.live2d.com/sdk-web/bin/live2d.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.12/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0-beta.2/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit/dist/kalidokit.bundle.js"></script>

    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; }
        #controls { position: fixed; top: 20px; left: 20px; z-index: 10; }
        button { padding: 15px; background: #0f0; border: none; font-weight: bold; cursor: pointer; }
        #debug { position: fixed; bottom: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.8); padding: 10px; font-size: 11px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="controls"><button id="start">CLICK TO START</button></div>
    <canvas id="canvas"></canvas>
    <div id="debug">System Ready.</div>
    <video id="video" style="display:none" playsinline></video>

    <script>
        const log = (t) => { document.getElementById('debug').innerText = t; };
        const video = document.getElementById('video');

        const app = new PIXI.Application({
            view: document.getElementById("canvas"),
            autoStart: true, resizeTo: window, transparent: true
        });

        document.getElementById('start').addEventListener('click', async () => {
            document.getElementById('controls').style.display = 'none';
            log("Verifying Libraries...");

            // THE FIX: Check for PIXI.live2d or window.PIXI.live2d
            const live2dReady = PIXI.live2d || (window.PIXI && window.PIXI.live2d);

            if (!live2dReady) {
                log("ERROR: Live2D Plugin not loaded yet. Try refreshing.");
                return;
            }

            try {
                log("Loading model.json...");
                // Note: Ensure model.json is in your /Live2d/ folder root
                const model = await PIXI.live2d.Live2DModel.from("model.json");
                app.stage.addChild(model);
                
                model.x = window.innerWidth / 2;
                model.y = window.innerHeight / 2;
                model.anchor.set(0.5, 0.5);
                model.scale.set(0.2); 

                log("Asking for Camera...");
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                startTracking(model);
            } catch (e) {
                log("LOAD ERROR: " + e.message);
                console.error(e);
            }
        });

        function startTracking(model) {
            const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
            
            faceMesh.onResults((res) => {
                if (res.multiFaceLandmarks?.[0]) {
                    const rig = Kalidokit.Face.solve(res.multiFaceLandmarks[0], { runtime: 'mediapipe', video: video });
                    const core = model.internalModel.coreModel;
                    
                    core.setParamFloat('PARAM_ANGLE_X', rig.degrees.pitch);
                    core.setParamFloat('PARAM_ANGLE_Y', rig.degrees.yaw);
                    core.setParamFloat('PARAM_MOUTH_OPEN_Y', rig.mouth.y);
                    core.setParamFloat('PARAM_EYE_L_OPEN', rig.eye.l);
                    core.setParamFloat('PARAM_EYE_R_OPEN', rig.eye.r);
                }
            });

            const cam = new Camera(video, {
                onFrame: async () => { await faceMesh.send({image: video}); },
                width: 640, height: 480
            });
            cam.start();
            log("TRACKING ACTIVE!");
        }
    </script>
</body>
</html>
