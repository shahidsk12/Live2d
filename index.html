<!DOCTYPE html>
<html>
<head>
    <title>Nanami VTuber</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://cubism.live2d.com/sdk-web/bin/live2d.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.12/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0-beta.2/dist/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit/dist/kalidokit.bundle.js"></script>

    <style>
        body { margin: 0; background: #1a1a1a; color: #00ff00; font-family: monospace; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        button { padding: 20px 40px; background: #00ff00; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; }
        #status { background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="ui">
        <div id="status">Loading Engine...</div>
        <button id="start-btn">START VTUBER</button>
    </div>
    <video id="video" style="display:none" playsinline></video>

    <script>
        const status = document.getElementById('status');
        const startBtn = document.getElementById('start-btn');
        const video = document.getElementById('video');

        // 1. Wait for Libraries to be ready
        const checkInterval = setInterval(() => {
            if (window.PIXI && PIXI.live2d && PIXI.live2d.Live2DModel) {
                status.style.display = 'none';
                startBtn.style.display = 'block';
                clearInterval(checkInterval);
            } else {
                console.log("Waiting for Live2D plugin...");
            }
        }, 500);

        const app = new PIXI.Application({
            view: document.getElementById("canvas"),
            autoStart: true, resizeTo: window, transparent: true
        });

        startBtn.addEventListener('click', async () => {
            startBtn.style.display = 'none';
            status.style.display = 'block';
            status.innerText = "Accessing Camera & Model...";

            try {
                // LOAD MODEL
                const model = await PIXI.live2d.Live2DModel.from("model.json");
                app.stage.addChild(model);
                model.anchor.set(0.5, 0.5);
                model.x = window.innerWidth / 2;
                model.y = window.innerHeight / 2;
                model.scale.set(0.2);

                // CAMERA PERMISSION
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                
                status.innerText = "Tracking Active!";
                setTimeout(() => status.style.display = 'none', 2000);

                initTracking(model);
            } catch (e) {
                status.innerText = "ERROR: " + e.message;
                status.style.color = "red";
                console.error(e);
            }
        });

        function initTracking(model) {
            const faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });

            faceMesh.onResults((results) => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
                    const rig = Kalidokit.Face.solve(results.multiFaceLandmarks[0], {
                        runtime: 'mediapipe', video: video
                    });
                    
                    const core = model.internalModel.coreModel;
                    core.setParamFloat('PARAM_ANGLE_X', rig.degrees.pitch);
                    core.setParamFloat('PARAM_ANGLE_Y', rig.degrees.yaw);
                    core.setParamFloat('PARAM_MOUTH_OPEN_Y', rig.mouth.y);
                    core.setParamFloat('PARAM_EYE_L_OPEN', rig.eye.l);
                    core.setParamFloat('PARAM_EYE_R_OPEN', rig.eye.r);
                }
            });

            const camera = new Camera(video, {
                onFrame: async () => { await faceMesh.send({image: video}); },
                width: 640, height: 480
            });
            camera.start();
        }
    </script>
</body>
</html>
