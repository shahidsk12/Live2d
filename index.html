<!DOCTYPE html>
<html>
<head>
    <title>Nanami Live2D</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://cdn.jsdelivr.net/gh/dabbott/live2d-js@master/lib/live2d.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.12/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0-beta.2/dist/index.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/kalidokit/dist/kalidokit.bundle.js"></script>

    <style>
        body { margin: 0; background: #111; overflow: hidden; color: #00ff00; font-family: monospace; }
        canvas { width: 100vw; height: 100vh; display: block; }
        #ui { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; }
        button { padding: 20px 40px; background: #00ff00; border: none; font-weight: bold; border-radius: 10px; cursor: pointer; }
        #log { position: fixed; bottom: 0; width: 100%; height: 100px; background: rgba(0,0,0,0.8); padding: 10px; font-size: 11px; overflow-y: auto; pointer-events: none; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="ui"><button id="start-btn">START TRACKING</button></div>
    <div id="log">>> System Ready. Click the button to start.</div>
    <video id="video" style="display:none" playsinline></video>

    <script>
        const logBox = document.getElementById('log');
        const print = (t) => { logBox.innerHTML += `<br>> ${t}`; logBox.scrollTop = logBox.scrollHeight; };

        // 1. Setup PIXI Application
        const app = new PIXI.Application({
            view: document.getElementById("canvas"),
            autoStart: true, resizeTo: window, transparent: true
        });

        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('ui').style.display = 'none';
            print("Validating PIXI Live2D...");

            // This check prevents the 'Undefined' crash
            if (!PIXI || !PIXI.live2d || !PIXI.live2d.Live2DModel) {
                print("FATAL ERROR: Live2D Plugin failed to load. Are you offline?");
                return;
            }

            try {
                print("Loading model.json from root...");
                // Load model using the validated class
                const model = await PIXI.live2d.Live2DModel.from("model.json");
                
                app.stage.addChild(model);
                
                // Adjust for your specific Nanami model size
                model.anchor.set(0.5, 0.5);
                model.x = window.innerWidth / 2;
                model.y = window.innerHeight / 2;
                model.scale.set(0.2); 

                print("Requesting Camera...");
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video').srcObject = stream;

                print("Setting up Face Tracking...");
                initTracker(model);

            } catch (err) {
                print("ERROR: " + err.message);
                console.error(err);
            }
        });

        function initTracker(model) {
            const faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });

            faceMesh.onResults((results) => {
                if (results.multiFaceLandmarks && results.multiFaceLandmarks[0]) {
                    const rig = Kalidokit.Face.solve(results.multiFaceLandmarks[0], {
                        runtime: 'mediapipe', video: document.getElementById('video')
                    });
                    
                    // Apply tracking to your .moc parameters
                    const core = model.internalModel.coreModel;
                    core.setParamFloat('PARAM_ANGLE_X', rig.degrees.pitch);
                    core.setParamFloat('PARAM_ANGLE_Y', rig.degrees.yaw);
                    core.setParamFloat('PARAM_ANGLE_Z', rig.degrees.roll);
                    core.setParamFloat('PARAM_MOUTH_OPEN_Y', rig.mouth.y);
                    core.setParamFloat('PARAM_EYE_L_OPEN', rig.eye.l);
                    core.setParamFloat('PARAM_EYE_R_OPEN', rig.eye.r);
                }
            });

            const camera = new Camera(document.getElementById('video'), {
                onFrame: async () => { 
                    await faceMesh.send({image: document.getElementById('video')}); 
                },
                width: 640, height: 480
            });
            camera.start();
            print("SUCCESS: Tracking is now active!");
        }
    </script>
</body>
</html>
